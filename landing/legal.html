<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- CSP: strictly same-origin (fonts are self-hosted). Legal docs are fetched
     same-origin (connect-src 'self'); inline script/style need 'unsafe-inline'. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'">
<title>СОСЕД — Legal</title>
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<meta name="theme-color" content="#0d0b0a">
<link rel="stylesheet" href="fonts.css">
<style>
  :root {
    --bg: #0d0b0a; --panel: #17130f; --panel-2: #26221a; --border: #3a331f;
    --fg: #ede8dd; --muted: #8a8172; --muted-2: #6e6858; --accent: #d6552f; --accent-ink: #1c0e07;
  }
  [data-mode="light"] {
    --bg: #e9e6dd; --panel: #f4f1e8; --panel-2: #ded9cc;
    --border: #1e1b14; --fg: #181510; --muted: #5f5a4e; --muted-2: #7f7a6a;
  }
  [data-theme="crimson"] { --accent: #e0342b; --accent-ink: #fdeceb; }
  [data-theme="teal"]    { --accent: #1fb39a; --accent-ink: #04201c; }
  [data-theme="azure"]   { --accent: #3d84d6; --accent-ink: #eaf2ff; }
  [data-theme="violet"]  { --accent: #9b5de5; --accent-ink: #f3ecfd; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* Keyboard focus must be visible on every interactive element. */
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  body { background: var(--bg); color: var(--fg); font-family: "Golos Text", -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 0 24px; }
  .mono { font-family: "JetBrains Mono", monospace; text-transform: uppercase; letter-spacing: 0.18em; font-size: 0.7rem; }
  a { color: var(--accent); }

  header.top { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 26px 0 22px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--fg); }
  .brand .mark { width: 30px; height: 30px; color: var(--accent); display: flex; }
  .brand .name { font-family: "Unbounded", sans-serif; font-weight: 800; letter-spacing: 0.02em; font-size: 0.95rem; }
  .controls { display: flex; align-items: center; gap: 10px; }
  .seg { display: flex; border: 1px solid var(--border); }
  .seg button { background: transparent; color: var(--muted); cursor: pointer; border: none; border-right: 1px solid var(--border);
    font-family: "JetBrains Mono", monospace; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.64rem; padding: 8px 12px; }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: var(--accent); color: var(--accent-ink); }

  main { padding: 40px 0 20px; }
  .doc h1 { font-family: "Unbounded", sans-serif; font-weight: 900; text-transform: uppercase; font-size: clamp(1.6rem, 5vw, 2.4rem); line-height: 1.04; margin-bottom: 8px; }
  .doc h2 { font-family: "Unbounded", sans-serif; font-weight: 800; text-transform: uppercase; font-size: 1.05rem; margin: 34px 0 12px; padding-top: 18px; border-top: 1px solid var(--border); }
  .doc h3, .doc h4 { font-family: "JetBrains Mono", monospace; text-transform: uppercase; letter-spacing: 0.12em; font-size: 0.72rem; color: var(--accent); margin: 20px 0 8px; }
  .doc p { color: var(--fg); line-height: 1.65; margin: 10px 0; }
  .doc ul { margin: 10px 0 10px 22px; }
  .doc li { color: var(--fg); line-height: 1.6; margin: 6px 0; }
  .doc strong { color: var(--fg); }
  .doc blockquote { border-left: 3px solid var(--accent); background: var(--panel); color: var(--muted); padding: 14px 18px; margin: 16px 0; font-size: 0.92rem; }
  .doc code { font-family: "JetBrains Mono", monospace; background: var(--panel-2); padding: 1px 5px; font-size: 0.86em; }
  .doc em { color: var(--muted); }
  .loading { color: var(--muted); }

  footer.bottom { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    padding: 30px 0; margin-top: 50px; border-top: 1px solid var(--border); color: var(--muted-2); }
  footer .mono a { color: var(--muted-2); text-decoration: none; }
  .accent { color: var(--accent); }
  @media (max-width: 560px) { header.top { padding: 18px 0; } .controls { width: 100%; justify-content: space-between; } }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <a class="brand" href="index.html" aria-label="Back to sosed.place">
      <span class="mark">
        <svg width="30" height="30" viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="46" fill="none" stroke="currentColor" stroke-width="2.5"/>
          <g transform="translate(16.3,16.8) scale(0.88)">
            <rect x="50" y="10" width="7" height="14" rx="2" fill="currentColor"/>
            <path d="M36 4 L64 28 V57 H32 L20 67 V57 H8 V28 Z" fill="currentColor" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
            <rect x="22" y="32" width="18" height="5" rx="2.5" style="fill:var(--bg)"/>
            <rect x="22" y="43" width="27" height="5" rx="2.5" style="fill:var(--bg)"/>
          </g>
        </svg>
      </span>
      <span class="name">sosed.place</span>
    </a>
    <div class="controls">
      <div class="seg" id="docSeg">
        <button data-doc="terms" class="on">Terms</button>
        <button data-doc="privacy">Privacy</button>
        <button data-doc="rules">Rules</button>
      </div>
      <div class="seg" id="langSeg">
        <button data-lang="en" class="on">EN</button>
        <button data-lang="ru">RU</button>
      </div>
    </div>
  </header>

  <main><div class="doc" id="doc"><p class="loading mono">Loading…</p></div></main>

  <footer class="bottom mono">
    <span>© 2026 sosed.place · by <span class="accent">PSYTICAN</span></span>
    <a href="index.html">← sosed.place</a>
  </footer>
</div>

<script>
  // Inherit the theme from the landing: the user's saved accent, otherwise the current
  // session's random accent; light/dark from the user's choice or the OS default.
  (function () {
    const ACC = ["", "crimson", "teal", "azure", "violet"];
    let ai = localStorage.getItem("nb-accent");
    if (ai === null) ai = sessionStorage.getItem("nb-accent-active");
    ai = parseInt(ai || "0", 10) || 0;
    if (ACC[ai]) document.documentElement.dataset.theme = ACC[ai];
    let m = localStorage.getItem("nb-mode");
    if (!m) m = (window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
    if (m === "light") document.documentElement.dataset.mode = "light";
  })();

  // Minimal, safe markdown renderer (escapes HTML, then applies a small subset).
  function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  // Allow only http(s)/mailto and relative/anchor links; reject javascript:,
  // data: and any other scheme so a crafted [x](javascript:…) cannot execute.
  function safeUrl(u) {
    const t = u.trim();
    const ok = /^(https?:|mailto:)/i.test(t) || /^[/#]/.test(t) || /^[^:]*$/.test(t);
    return ok ? t.replace(/"/g, "%22") : null;
  }
  function inline(s) {
    return esc(s)
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>")
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_m, text, url) => {
        const href = safeUrl(url);
        return href ? '<a href="' + href + '" rel="noopener">' + text + "</a>" : text;
      })
      .replace(/(^|\s)((?:https?:\/\/|mailto:)[^\s<]+)/g, '$1<a href="$2" rel="noopener">$2</a>');
  }
  function renderMd(md) {
    const lines = md.replace(/\r/g, "").split("\n");
    let html = "", inList = false, inQuote = false;
    const closeList = () => { if (inList) { html += "</ul>"; inList = false; } };
    const closeQuote = () => { if (inQuote) { html += "</blockquote>"; inQuote = false; } };
    for (let raw of lines) {
      const line = raw.trimEnd();
      if (/^#{4}\s/.test(line)) { closeList(); closeQuote(); html += "<h4>" + inline(line.replace(/^#{4}\s/, "")) + "</h4>"; }
      else if (/^#{3}\s/.test(line)) { closeList(); closeQuote(); html += "<h3>" + inline(line.replace(/^#{3}\s/, "")) + "</h3>"; }
      else if (/^#{2}\s/.test(line)) { closeList(); closeQuote(); html += "<h2>" + inline(line.replace(/^#{2}\s/, "")) + "</h2>"; }
      else if (/^#\s/.test(line)) { closeList(); closeQuote(); html += "<h1>" + inline(line.replace(/^#\s/, "")) + "</h1>"; }
      else if (/^>\s?/.test(line)) { closeList(); if (!inQuote) { html += "<blockquote>"; inQuote = true; } html += inline(line.replace(/^>\s?/, "")) + " "; }
      else if (/^[-*]\s/.test(line)) { closeQuote(); if (!inList) { html += "<ul>"; inList = true; } html += "<li>" + inline(line.replace(/^[-*]\s/, "")) + "</li>"; }
      else if (line === "") { closeList(); closeQuote(); }
      else { closeList(); closeQuote(); html += "<p>" + inline(line) + "</p>"; }
    }
    closeList(); closeQuote();
    return html;
  }

  const FILES = { terms: "terms", privacy: "privacy", rules: "community-guidelines" };
  const params = new URLSearchParams(location.search);
  let DOC = Object.keys(FILES).includes(params.get("doc")) ? params.get("doc") : "terms";
  const stored = localStorage.getItem("lang");
  let LANG = ["en", "ru"].includes(params.get("lang")) ? params.get("lang")
    : (["en", "ru"].includes(stored) ? stored : ((navigator.language || "en").slice(0, 2).toLowerCase() === "ru" ? "ru" : "en"));

  const docEl = document.getElementById("doc");
  // Fetch one doc with a timeout so a hung request can't spin forever.
  async function fetchMd(doc, lang, timeoutMs = 8000) {
    const file = "legal/" + FILES[doc] + "_" + lang.toUpperCase() + ".md";
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), timeoutMs);
    try {
      const res = await fetch(file, { cache: "no-cache", signal: ctrl.signal });
      if (!res.ok) throw new Error("not found");
      return await res.text();
    } finally {
      clearTimeout(timer);
    }
  }
  async function load() {
    document.querySelectorAll("#docSeg button").forEach((b) => b.classList.toggle("on", b.dataset.doc === DOC));
    document.querySelectorAll("#langSeg button").forEach((b) => b.classList.toggle("on", b.dataset.lang === LANG));
    document.documentElement.lang = LANG;
    docEl.innerHTML = '<p class="loading mono">Loading…</p>';
    try {
      let md;
      try {
        md = await fetchMd(DOC, LANG);
      } catch (e) {
        // Missing translation or a transient failure — fall back to English
        // rather than showing an error (not all docs exist in every language).
        if (LANG !== "en") md = await fetchMd(DOC, "en");
        else throw e;
      }
      docEl.innerHTML = renderMd(md);
    } catch (e) {
      docEl.innerHTML = '<p class="loading mono">Could not load this document. Please try again.</p>';
    }
    window.scrollTo(0, 0);
  }
  document.querySelectorAll("#docSeg button").forEach((b) => b.addEventListener("click", () => { DOC = b.dataset.doc; load(); }));
  document.querySelectorAll("#langSeg button").forEach((b) => b.addEventListener("click", () => { LANG = b.dataset.lang; localStorage.setItem("lang", LANG); load(); }));
  load();
</script>
</body>
</html>
