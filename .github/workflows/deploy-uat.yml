name: Deploy UAT

# Merge/push to main → cut a dated release tag → deploy that tag to UAT.
on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: tag
        name: Create release tag
        run: |
          TAG="v$(date +%Y.%m.%d)-${GITHUB_SHA::7}"
          # Idempotent: a re-run of the same commit must not fail on an existing tag.
          git tag "$TAG" 2>/dev/null || echo "tag $TAG already exists locally"
          git push origin "$TAG" 2>/dev/null || echo "tag $TAG already on remote"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release $TAG"

  deploy:
    needs: release
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
      - name: Deploy landing
        env:
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
          BUNNY_STORAGE_API_KEY: ${{ secrets.BUNNY_STORAGE_API_KEY }}
          BUNNY_PULL_ZONE_ID: ${{ secrets.BUNNY_PULL_ZONE_ID }}
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          RELAY_API_URL: ${{ secrets.RELAY_API_URL }}
        run: bash deploy/deploy-landing.sh
